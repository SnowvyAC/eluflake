<!DOCTYPE html>
<html lang="en">
<head>
    <!--Webstorm-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Den</title>
    <!--Style-->
    <link href="Styles/StyleMain.css" rel="stylesheet" />
    <!--Google API-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
            href="https://fonts.googleapis.com/css2?family=Arimo&family=Roboto&family=Sofia&family=Tangerine&display=swap"
            rel="stylesheet"
    />
</head>
<body>
<h1>The Den</h1>
<input type="checkbox" id="dark_mode" name="dark_mode" value="0">
<label for="dark_mode">Enable Dark mode</label>
<p id="ip-address">Ip Placeholder</p>
<h2><b>Server status:</b></h2>
<p>Placeholder</p>
<p>Placeholder</p>
<p>Placeholder</p>
<h2><b>Cloud</b></h2>
<a href="MyBlog.html"><h2><b>Blog</b></h2></a>
<h2><b>API key updates</b></h2>
<button type="button">Random API: test</button>
<script>
    // Dark Mode Toggle Logic
    const darkModeToggle = document.getElementById("dark_mode");
    const body = document.body;
    darkModeToggle.addEventListener("change", () => {
        body.classList.toggle("dark-mode", darkModeToggle.checked);
    });
</script>
<script>
    // IP Address Grabber
    const api_url = "https://api.ipify.org?format=json";
    async function getIP() {
        try {
            const response = await fetch(api_url);
            const data = await response.json();
        const ipElement = document.getElementById("ip-address");
        ipElement.textContent = "Your IP: " + data.ip;
    } catch (error) {
            console.error("Error fetching IP:", error);
            const ipElement = document.getElementById("ip-address");
            ipElement.textContent = "Could not get IP.";
        }
    }
    getIP();
</script>
<script>
    // Random API Button
    function updateAPI() {
        const name = prompt("Enter new API Key");
        document.querySelector("button").textContent = `Random API: ${name}`;
    }
    const button = document.querySelector("button");
    button.addEventListener("click", updateAPI);
</script>
</body>
</html>
